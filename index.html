<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Lato:wght@300;400&family=Noto+Serif+Tamil:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --pink: #e8a4c8; --lavender: #c3a8d8; --blue: #a8c4e0; --dusty-rose: #d4849f;
    --text-light: rgba(255,255,255,0.92); --text-muted: rgba(255,255,255,0.6);
    --card-bg: rgba(255,252,255,0.97); --card-text: #3a2a35; --card-muted: #7a6070;
  }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: 'Lato', sans-serif;
    background: linear-gradient(135deg,#2d1b3d 0%,#3d1f3a 18%,#2a1e45 36%,#1e2a4a 55%,#2e1f42 72%,#3a1c38 100%);
    display: flex; align-items: center; justify-content: center; min-height: 100vh;
  }
  .orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.35; pointer-events: none; animation: drift linear infinite; }
  .orb-1 { width:500px; height:500px; background:radial-gradient(circle,#c06090,transparent); top:-10%; left:-10%; animation-duration:25s; }
  .orb-2 { width:600px; height:600px; background:radial-gradient(circle,#7060b0,transparent); bottom:-15%; right:-10%; animation-duration:30s; animation-direction:reverse; }
  .orb-3 { width:400px; height:400px; background:radial-gradient(circle,#4070b0,transparent); top:30%; left:50%; animation-duration:20s; animation-delay:-8s; }
  @keyframes drift {
    0%   { transform:translate(0,0) scale(1); }
    33%  { transform:translate(40px,-30px) scale(1.05); }
    66%  { transform:translate(-20px,40px) scale(0.97); }
    100% { transform:translate(0,0) scale(1); }
  }
  #particles { position:fixed; inset:0; pointer-events:none; z-index:1; }
  #hero {
    position:relative; z-index:10; display:flex; flex-direction:column;
    align-items:center; text-align:center; padding:2rem; gap:1.6rem;
    animation:heroIn 2s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes heroIn { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
  .eyebrow { font-family:'Lato',sans-serif; font-weight:300; font-size:0.8rem; letter-spacing:0.35em; text-transform:uppercase; color:var(--text-muted); animation:heroIn 2s 0.3s cubic-bezier(0.16,1,0.3,1) both; }
  h1 { font-family:'Cormorant Garamond',serif; font-weight:300; font-size:clamp(3.5rem,10vw,7rem); color:var(--text-light); line-height:1.05; letter-spacing:0.02em; text-shadow:0 0 80px rgba(220,160,200,0.5),0 2px 40px rgba(0,0,0,0.4); animation:heroIn 2s 0.5s cubic-bezier(0.16,1,0.3,1) both; }
  h1 em { font-style:italic; color:var(--pink); display:block; font-size:1.08em; }
  .subtitle { font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:300; font-size:1.25rem; color:var(--text-muted); letter-spacing:0.08em; animation:heroIn 2s 0.8s cubic-bezier(0.16,1,0.3,1) both; }
  .open-btn {
    margin-top:0.5rem; padding:0.9rem 2.8rem; background:transparent;
    border:1px solid rgba(220,170,200,0.5); border-radius:50px; color:var(--text-light);
    font-family:'Lato',sans-serif; font-weight:300; font-size:0.85rem; letter-spacing:0.25em;
    text-transform:uppercase; cursor:pointer; transition:all 0.5s ease; position:relative; overflow:hidden;
    animation:heroIn 2s 1.1s cubic-bezier(0.16,1,0.3,1) both;
  }
  .open-btn::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(200,130,170,0.2),rgba(130,110,200,0.2)); opacity:0; transition:opacity 0.5s ease; }
  .open-btn:hover { border-color:rgba(220,170,200,0.9); transform:translateY(-2px); box-shadow:0 8px 40px rgba(200,130,170,0.25),0 0 0 1px rgba(220,170,200,0.2); }
  .open-btn:hover::before { opacity:1; }
  .open-btn:active { transform:translateY(0); }
  #overlay {
    position:fixed; inset:0; z-index:100; background:rgba(20,12,28,0.7);
    backdrop-filter:blur(12px); display:flex; align-items:center; justify-content:center;
    padding:1.5rem; opacity:0; pointer-events:none; transition:opacity 0.8s ease;
  }
  #overlay.visible { opacity:1; pointer-events:all; }
  .letter-wrap { position:relative; max-width:580px; width:100%; max-height:88vh; animation:letterRise 0.9s cubic-bezier(0.16,1,0.3,1) both; }
  @keyframes letterRise { from{opacity:0;transform:translateY(50px) scale(0.97)} to{opacity:1;transform:translateY(0) scale(1)} }
  .letter-card {
    background:var(--card-bg); border-radius:2px; padding:3.5rem 3.5rem 2.5rem;
    position:relative; overflow-y:auto; max-height:82vh; scrollbar-width:thin; scrollbar-color:rgba(200,130,170,0.3) transparent;
    box-shadow:0 4px 6px rgba(0,0,0,0.07),0 20px 60px rgba(0,0,0,0.25),0 0 0 1px rgba(220,170,200,0.15),inset 0 0 60px rgba(220,170,200,0.04);
  }
  .letter-card::before {
    content:''; position:absolute; inset:0; border-radius:2px; pointer-events:none;
    background-image:repeating-linear-gradient(to bottom,transparent 0,transparent 31px,rgba(200,150,180,0.07) 31px,rgba(200,150,180,0.07) 32px);
    background-position:0 3.5rem;
  }
  .letter-card::after { content:''; position:absolute; top:0; left:3.8rem; width:1px; height:100%; background:rgba(220,160,190,0.15); pointer-events:none; }
  .letter-date { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:0.85rem; color:var(--card-muted); margin-bottom:2rem; display:block; opacity:0; }
  #letter-body { font-family:'Cormorant Garamond','Noto Serif Tamil',serif; font-size:1.08rem; line-height:2.1; color:var(--card-text); font-weight:300; white-space:pre-wrap; }
  .fade-line { animation:fadeLine 0.6s ease both; }
  @keyframes fadeLine { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .close-btn {
    position:absolute; top:-14px; right:-14px; width:36px; height:36px;
    border-radius:50%; background:rgba(40,25,50,0.85); border:1px solid rgba(220,170,200,0.3);
    color:rgba(255,255,255,0.7); font-size:1rem; cursor:pointer;
    display:flex; align-items:center; justify-content:center; transition:all 0.3s ease;
    backdrop-filter:blur(4px); z-index:10;
  }
  .close-btn:hover { background:rgba(60,35,70,0.95); color:white; transform:scale(1.1); }
  #music-note {
    position:fixed; bottom:2rem; right:2rem; z-index:200;
    display:flex; align-items:center; gap:8px; font-size:0.72rem;
    letter-spacing:0.12em; color:rgba(255,255,255,0.45); font-family:'Lato',sans-serif;
    font-weight:300; opacity:0; transition:opacity 1s ease; cursor:pointer; text-transform:uppercase;
  }
  #music-note.visible { opacity:1; }
  #music-note .note-icon { width:32px; height:32px; border-radius:50%; border:1px solid rgba(220,170,200,0.35); display:flex; align-items:center; justify-content:center; transition:border-color 0.3s; }
  #music-note:hover .note-icon { border-color:rgba(220,170,200,0.8); }
  .sound-bars { display:flex; align-items:flex-end; gap:2px; height:14px; }
  .sound-bars span { display:block; width:3px; background:rgba(220,170,200,0.6); border-radius:2px; animation:soundBar 1.2s ease-in-out infinite; }
  .sound-bars span:nth-child(1){height:4px;animation-delay:0s}
  .sound-bars span:nth-child(2){height:10px;animation-delay:0.2s}
  .sound-bars span:nth-child(3){height:7px;animation-delay:0.4s}
  .sound-bars span:nth-child(4){height:12px;animation-delay:0.1s}
  .sound-bars.paused span { animation-play-state:paused; }
  @keyframes soundBar { 0%,100%{transform:scaleY(1)} 50%{transform:scaleY(0.35)} }
</style>
</head>

// ── Particles ──────────────────────────────────────────────────────────────
const canvas = document.getElementById('particles');
const ctx    = canvas.getContext('2d');
let particles = [];
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);
const SYMBOLS = ['♡','✶','·','⋆','˚'];
function createParticle() {
  const isHeart = Math.random() < 0.25;
  return {
    x: Math.random() * canvas.width, y: canvas.height + 20,
    size: isHeart ? (Math.random()*12+8) : (Math.random()*3+1),
    symbol: isHeart ? '♡' : SYMBOLS[Math.floor(Math.random()*SYMBOLS.length)],
    speed: Math.random()*0.6+0.2, drift: (Math.random()-0.5)*0.4,
    opacity: Math.random()*0.5+0.1, wobble: Math.random()*Math.PI*2,
    wobbleSpeed: Math.random()*0.02+0.005,
    color: ['rgba(220,160,200,','rgba(180,160,230,','rgba(160,190,230,','rgba(240,190,210,'][Math.floor(Math.random()*4)]
  };
}
for (let i=0;i<60;i++) { const p=createParticle(); p.y=Math.random()*canvas.height; particles.push(p); }
function animateParticles() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach((p,i) => {
    p.y -= p.speed; p.x += p.drift + Math.sin(p.wobble)*0.3; p.wobble += p.wobbleSpeed;
    if (p.y < -30) particles[i] = createParticle();
    ctx.save(); ctx.globalAlpha=p.opacity; ctx.fillStyle=p.color+p.opacity+')';
    ctx.font=p.size+'px serif'; ctx.textAlign='center'; ctx.fillText(p.symbol,p.x,p.y); ctx.restore();
  });
  requestAnimationFrame(animateParticles);
}
animateParticles();

  setTimeout(() => fadeIn(document.getElementById('letter-date')), 300);
  const body  = document.getElementById('letter-body');
  const paras = MESSAGE.trim().split(/\n\n+/);
  let delay   = 700;
  paras.forEach(para => {
    const p = document.createElement('p');
    p.classList.add('fade-line');
    p.style.opacity = '0'; p.style.marginBottom = '1.2rem';
    p.style.animationFillMode = 'both'; p.style.animationDelay = delay + 'ms';
    const isTamilQuote = /[\u0B80-\u0BFF]/.test(para) && para.trim().startsWith('"');
    if (isTamilQuote) {
      p.style.fontStyle='italic'; p.style.color='#8a5570';
      p.style.borderLeft='2px solid rgba(180,120,150,0.35)';
      p.style.paddingLeft='1rem'; p.style.marginLeft='0.5rem';
      p.style.lineHeight='2.3'; p.style.fontSize='1rem';
    }
    p.textContent = para.trim();
    body.appendChild(p);
    delay += Math.max(700, para.length * 12);
  });
  setTimeout(() => { startMusic(); document.getElementById('music-note').classList.add('visible'); }, 1000);
}
function fadeIn(el) {
  el.style.transition='opacity 0.9s ease, transform 0.9s ease'; el.style.transform='translateY(6px)';
  requestAnimationFrame(() => requestAnimationFrame(() => { el.style.opacity='1'; el.style.transform='translateY(0)'; }));
}
function closeLetter() {
  const overlay = document.getElementById('overlay');
  overlay.style.opacity='0'; overlay.style.transition='opacity 0.6s ease';
  setTimeout(() => {
    overlay.classList.remove('visible'); overlay.style.opacity=''; overlay.style.transition='';
    document.getElementById('letter-body').innerHTML='';
    document.getElementById('letter-date').style.opacity='0';
    letterOpened = false;
  }, 600);
}
document.getElementById('overlay').addEventListener('click', function(e) { if(e.target===this) closeLetter(); });

// ── Music ──────────────────────────────────────────────────────────────────
let musicPlaying = false;
function startMusic() {
  if (musicPlaying) return;
  const audio = document.getElementById('bg-music');
  audio.volume = 0.06;
  audio.play().catch(() => {});
  musicPlaying = true;
}
function toggleMusic() {
  const audio = document.getElementById('bg-music');
  const bars  = document.getElementById('sound-bars');
  const label = document.getElementById('music-label');
  if (musicPlaying) {
    audio.pause(); musicPlaying = false;
    bars.classList.add('paused'); label.textContent = 'Music off';
  } else {
    audio.volume = 0.06; audio.play();
    musicPlaying = true; bars.classList.remove('paused'); label.textContent = 'Music on';
  }
}
</script>
